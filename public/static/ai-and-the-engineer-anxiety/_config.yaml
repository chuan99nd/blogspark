title: "AI và nỗi lo của người viết code"
createdAt: "2026-03-09T00:00:00Z"
modifiedAt: "2026-03-09T00:00:00Z"
summary: |
  AI ngày càng giỏi hơn – viết code nhanh hơn, ít bug hơn, không cần nghỉ phép. Và đâu đó, những kỹ sư phần mềm bắt đầu tự hỏi: "Mình có đang bị thay thế không?" Bài viết này không trả lời câu hỏi đó. Nó chỉ kể lại cảm giác của một người đang sống giữa thời kỳ mà công cụ mình dùng mỗi ngày, cũng đang dần học cách làm việc của mình.
